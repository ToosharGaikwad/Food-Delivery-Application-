<div class="admin-panel">
  <div class="panel-header">
    <h2>Train Tracking</h2>
    @if (!showForm()) {
      <button type="button" class="btn btn-primary btn-sm" (click)="openCreate()">Add Train</button>
    }
  </div>

  @if (showForm()) {
    <form class="card form-card" (ngSubmit)="save()">
      <h3>New Train</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Train Number</label>
          <input [(ngModel)]="form.trainNumber" name="trainNumber" class="input" required />
        </div>
        <div class="form-group">
          <label>Train Name</label>
          <input [(ngModel)]="form.trainName" name="trainName" class="input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Source</label>
          <input [(ngModel)]="form.source" name="source" class="input" required />
        </div>
        <div class="form-group">
          <label>Destination</label>
          <input [(ngModel)]="form.destination" name="destination" class="input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Current Station</label>
          <input [(ngModel)]="form.currentStation" name="currentStation" class="input" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <input [(ngModel)]="form.status" name="status" class="input" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  }

  <div class="data-table card">
    <table>
      <thead>
        <tr><th>Number</th><th>Name</th><th>Route</th><th>Station</th><th>Status</th><th>Actions</th></tr>
      </thead>
      <tbody>
        @for (t of trains(); track t.trainNumber) {
          <tr>
            <td><strong>{{ t.trainNumber }}</strong></td>
            <td>{{ t.trainName }}</td>
            <td>{{ t.source }} → {{ t.destination }}</td>
            <td>{{ t.currentStation }}</td>
            <td>
              <div class="inline-form">
                <input
                  class="input input-sm"
                  [ngModel]="statusEdits()[t.trainNumber]"
                  (ngModelChange)="setStatusEdit(t.trainNumber, $event)"
                />
                <button type="button" class="btn btn-ghost btn-sm" (click)="updateStatus(t.trainNumber)">Save</button>
              </div>
            </td>
            <td>
              <button type="button" class="btn btn-danger btn-sm" (click)="delete(t.trainNumber)">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
