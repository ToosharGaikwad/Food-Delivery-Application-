<header class="navbar">
  <div class="container navbar-inner">
    <a routerLink="/" class="brand">
      <span class="brand-icon">🍽</span>
      <span class="brand-text">FoodServe</span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/restaurants" routerLinkActive="active">Restaurants</a>
      <a routerLink="/live-station" routerLinkActive="active">Live Station</a>

      @if (auth.isStaff()) {
        <a routerLink="/admin" routerLinkActive="active">Dashboard</a>
      }

      @if (auth.isLoggedIn()) {
        <a routerLink="/orders" routerLinkActive="active">My Orders</a>
        <a routerLink="/checkout" routerLinkActive="active" class="cart-link">
          Cart
          @if (cart.itemCount() > 0) {
            <span class="cart-badge">{{ cart.itemCount() }}</span>
          }
        </a>
      }
    </nav>

    <div class="nav-actions">
      @if (auth.isLoggedIn()) {
        <span class="user-chip">{{ auth.email() }}</span>
        <button type="button" class="btn btn-ghost btn-sm" (click)="auth.logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="btn btn-ghost btn-sm">Login</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Sign Up</a>
      }
    </div>
  </div>
</header>
