<div class="admin-panel">
  <div class="panel-header">
    <h2>Products</h2>
    @if (!showForm()) {
      <button type="button" class="btn btn-primary btn-sm" (click)="openCreate()">Add Product</button>
    }
  </div>

  @if (showForm()) {
    <form class="card form-card" (ngSubmit)="save()">
      <h3>New Product</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input [(ngModel)]="form.name" name="name" class="input" required />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input [(ngModel)]="form.category" name="category" class="input" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" [(ngModel)]="form.price" name="price" class="input" required />
        </div>
        <div class="form-group">
          <label>Restaurant</label>
          <select [(ngModel)]="form.restaurantId" name="restaurantId" class="input">
            @for (r of restaurants(); track r.id) {
              <option [value]="r.id">{{ r.name }}</option>
            }
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="form.available" name="available" />
          Available
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  }

  <div class="data-table card">
    <table>
      <thead>
        <tr><th>Name</th><th>Category</th><th>Price</th><th>Restaurant</th><th>Actions</th></tr>
      </thead>
      <tbody>
        @for (p of products(); track p.id) {
          <tr>
            <td><strong>{{ p.name }}</strong></td>
            <td>{{ p.category }}</td>
            <td>{{ p.price | currency:'INR':'symbol':'1.0-0' }}</td>
            <td>{{ p.restaurant?.name ?? '—' }}</td>
            <td>
              <button type="button" class="btn btn-danger btn-sm" (click)="delete(p.id)">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
