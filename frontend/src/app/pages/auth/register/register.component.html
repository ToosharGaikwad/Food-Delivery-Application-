<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <span class="auth-icon">🍽</span>
      <h1>Create account</h1>
      <p>Join FoodServe and start ordering</p>
    </div>

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" class="input" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" class="input" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" class="input" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading()">
        {{ loading() ? 'Creating…' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
