<div style="padding: 20px">
  <h2>👨‍💼 Admin Dashboard</h2>

  <!-- Navigation -->
  <div style="margin-bottom: 20px">
    <button (click)="section = 'products'">Manage Products</button>
    <button (click)="section = 'orders'">View Orders</button>
    <button (click)="section = 'restaurants'">Manage Restaurants</button>
  </div>

  <!-- ================= PRODUCTS ================= -->
  <div *ngIf="section === 'products'">
    <h3>Add Product</h3>

    <input
      type="text"
      placeholder="Product Name"
      [(ngModel)]="newProduct.name"
    />
    <input type="number" placeholder="Price" [(ngModel)]="newProduct.price" />
    <input
      type="text"
      placeholder="Category"
      [(ngModel)]="newProduct.category"
    />
    <input
      type="number"
      placeholder="Restaurant ID"
      [(ngModel)]="newProduct.restaurantId"
    />

    <button (click)="addProduct()">Add Product</button>

    <hr />

    <h3>Product List</h3>
    <div
      *ngFor="let p of products"
      style="border: 1px solid #ccc; margin: 10px; padding: 10px"
    >
      <h4>{{ p.name }}</h4>
      <p>Price: ₹{{ p.price }}</p>

      <button (click)="deleteProduct(p.id)">Delete</button>
    </div>
  </div>

  <!-- ================= ORDERS ================= -->
  <div *ngIf="section === 'orders'">
    <h3>All Orders</h3>

    <div
      *ngFor="let o of orders"
      style="border: 1px solid #ccc; margin: 10px; padding: 10px"
    >
      <p>Order ID: {{ o.order_id }}</p>
      <p>Total Amount: ₹{{ o.total_amount }}</p>
      <p>User ID: {{ o.user_id }}</p>
      <p>Status: {{ o.order_status }}</p>
      <p>Payment Mode: {{ o.payment_mode }}</p>

      <select [(ngModel)]="o.order_status">
        <option>PLACED</option>
        <option>ACCEPTED</option>
        <option>PREPARING</option>
        <option>DELIVERED</option>
      </select>

      <button (click)="updateStatus(o.order_id, o.order_status)">Update</button>
    </div>
  </div>

  <!-- ================= RESTAURANTS ================= -->
  <div *ngIf="section === 'restaurants'">
    <h3>Restaurants</h3>

    <div
      *ngFor="let r of restaurants"
      style="border: 1px solid #ccc; margin: 10px; padding: 10px"
    >
      <h4>{{ r.name }}</h4>
      <p>{{ r.address }}</p>

      <button (click)="deleteRestaurant(r.id)">Delete</button>
    </div>
  </div>
</div>
